<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulated Exchange</title>
    <style>
        body { background-color: #0d1117; margin: 0; }
        #chart-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
        }
        #chart { width: 100%; height: 100%; }
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        #spinner-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(13, 17, 23, 0.7);
            z-index: 9998;
        }
        #spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 9999;
        }
        #restart-btn {
            background-color: black;
            border: 1px solid #444;
            padding: 5px 10px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            transition: border-color 0.2s, color 0.2s;
        }

        #restart-btn:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .window {
            font-family: monospace;
            font-size: 13px;
            width: 150px;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.5);
        }

        #bids {
            height: 60px;
            overflow: hidden;
        }

        #asks {
            height: 60px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .volume-bar {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
        }

        .ask-bar {
            background-color: rgba(248, 81, 73, 0.15);
        }

        .bid-bar {
            background-color: rgba(63, 185, 80, 0.15);
        }

        .line {
            border: none;
            border-top: 1px solid #444;
            margin: 4px 0;
        }

        .text-white {
            color: #e6edf3;
        }

        .text-red {
            color: #f85149;
        }

        .text-green {
            color: #3fb950;
        }

        .entry {
            position:relative; 
            display:flex; 
            justify-content:space-between; 
            font-size:12px; 
            padding:2px 4px;
        }
    </style>
</head>
<body class="text-white">
    <div id="spinner"></div>
    <div id="spinner-backdrop"></div>
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button class="text-white" id="restart-btn" onclick="restart()">Restart Simulation</button>
    </div>
    <div style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
        <div class="window">
            <div>Orderbook</div>
            <hr class="line">
            <div id="asks"></div>
            <hr class="line">
            <div id="bids"></div>
        </div>
        <br/>
        <div class="window">
            <div>Trades</div>
            <hr class="line">
            <div id="trades"></div>
        </div>
    </div>
    <div id="chart-container">
        <div id="chart"></div>
    </div>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        const tzOffset = new Date().getTimezoneOffset() * -60;

        const GREEN = "#3fb950"
        const RED = "#f85149"
        const M_GREEN = "#87ceaa"
        const M_RED = "#ff8c7a"

        const spinner = document.getElementById("spinner");
        const spinnerBackdrop = document.getElementById('spinner-backdrop');

        const showSpinner = () => {
            spinner.style.display = 'block';
            spinnerBackdrop.style.display = 'block';
        };

        const hideSpinner = () => {
            spinner.style.display = 'none';
            spinnerBackdrop.style.display = 'none';
        };

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0d1117' }, textColor: '#e6edf3' },
            grid: { vertLines: { color: '#30363d' }, horzLines: { color: '#30363d' } },
            width: document.getElementById('chart').clientWidth,
            height: document.getElementById('chart').clientHeight,
            timeScale: {
                timeVisible: true,
                secondsVisible: true,
                timezone: 'Asia/Singapore',
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
        });

        const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
            upColor: GREEN,
            downColor: RED,
            borderUpColor: GREEN,
            borderDownColor: RED,
            wickUpColor: GREEN,
            wickDownColor: RED,
            priceScaleId: "right",
        });

        const volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
            color: '#58a6ff',
            priceFormat: { type: 'volume' },
            priceScaleId: 'volume',  
        });

        chart.priceScale('right').applyOptions({
            scaleMargins: { top: 0.1, bottom: 0.3 },
            autoScale: true,
            visible: true
        });

        chart.priceScale('volume').applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
            visible: false
        });

        let bidLine = null;
        let askLine = null;
        let currCandle = null;
        let bids = {}
        let asks = {}
        let trades = []
        let ws = null;

        function repaint() {
            const bids_ = { ...bids };
            const asks_ = { ...asks };
            const bidPrices = Object.keys(bids_).map(Number).sort((a, b) => b - a);
            const askPrices = Object.keys(asks_).map(Number).sort((a, b) => b - a);
            const maxQty = Math.max(...Object.values(bids_), ...Object.values(asks_), 1);

            document.getElementById('bids').innerHTML = bidPrices.map(px => {
                if (!bids_[px]) return '';
                const pct = Math.round(bids_[px] / maxQty * 100);
                return (`
                <div class="text-green entry">
                    <div class="bid-bar volume-bar" style="width:${pct}%"></div>
                    <span>${px}</span>
                    <span>${bids_[px]}</span>
                </div>`);
            }).join('');

            document.getElementById('asks').innerHTML = askPrices.map(px => {
                if (!asks_[px]) return '';
                const pct = Math.round(asks_[px] / maxQty * 100);
                return (`
                <div class="text-red entry">
                    <div class="ask-bar volume-bar" style="width:${pct}%"></div>
                    <span>${px}</span>
                    <span>${asks_[px]}</span>
                </div>`);
            }).join('');

            document.getElementById('trades').innerHTML = trades.map(t =>
                `<div class="${t.aggressor_side === 'BUY' ? 'text-green' : 'text-red'} entry">
                    <span>${t.px}</span>
                    <span>${t.qty}</span>
                </div>`
            ).join('');
        }

        setInterval(repaint, 200);

        async function restart() {
            await fetch('/restart', { method: 'POST' });
            init();
        }

        function onTrade(data) {
            data.ts += tzOffset;
            const time = data.ts - data.ts % 10;
            const price = parseFloat(data.px);

            if (!currCandle || currCandle.time !== time) {
                currCandle = { time, open: price, high: price, low: price, close: price, vol: data.qty };
            } else {
                currCandle.high = Math.max(currCandle.high, price);
                currCandle.low = Math.min(currCandle.low, price);
                currCandle.close = price;
                currCandle.vol += data.qty;
            }

            candleSeries.update(currCandle);
            volumeSeries.update({ time, value: currCandle.vol });

            trades.unshift(data);
            if (trades.length > 5) trades.pop();
        }

        async function init() {
            showSpinner();
            candleSeries.setData([]);
            volumeSeries.setData([]);
            if (askLine) candleSeries.removePriceLine(askLine);
            if (bidLine) candleSeries.removePriceLine(bidLine);
            bidLine = null;
            askLine = null;
            currCandle = null;
            currVol = 0;
            bids = {};
            asks = {};
            trades = [];

            const res = await fetch('/trades');
            const trades_ = await res.json();
            for (const t of trades_) onTrade(t);

            hideSpinner();

            ws = new WebSocket(`ws://${window.location.host}/ws`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                switch (data.type) {
                    case "trade":
                        onTrade(data);
                        break;
                    case "l1_quote":
                        if (bidLine) candleSeries.removePriceLine(bidLine);
                        if (askLine) candleSeries.removePriceLine(askLine);
                        if (data.bid_px) {
                            bidLine = candleSeries.createPriceLine({
                                price: parseFloat(data.bid_px),
                                color: M_GREEN,
                                lineWidth: 1,
                                lineStyle: LightweightCharts.LineStyle.Dashed,
                                axisLabelVisible: true,
                                title: 'bid',
                            });
                        }
                        if (data.ask_px) {
                            askLine = candleSeries.createPriceLine({
                                price: parseFloat(data.ask_px),
                                color: M_RED,
                                lineWidth: 1,
                                lineStyle: LightweightCharts.LineStyle.Dashed,
                                axisLabelVisible: true,
                                title: 'ask',
                            });
                        }
                        break;
                    case "l2_update":
                        data.bids.forEach(([price, qty]) => {
                            if (qty == 0) delete bids[price];
                            else bids[price] = qty;
                        });
                        data.asks.forEach(([price, qty]) => {
                            if (qty == 0) delete asks[price];
                            else asks[price] = qty;
                        });
                        break;
                    default:
                        console.log("unknown", data.type)
                }
            };
        }

        document.addEventListener('DOMContentLoaded', () => init());

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && (!ws || ws.readyState !== WebSocket.OPEN)) init();
        });

        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: document.getElementById('chart').clientWidth,
                height: document.getElementById('chart').clientHeight 
            });
        });
    </script>
</body>
</html>

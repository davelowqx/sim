<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulated Exchange</title>
    <style>
        body { background: #0d1117; margin: 0; }
        #chart { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button 
        onclick="restart()" 
        style="background: black;
                color: #e6edf3;
                border: 1px solid #444;
                padding: 5px 10px;
                font-family: monospace;
                font-size: 13px;
                cursor: pointer;
                border-radius: 4px;
                transition: border-color 0.2s, color 0.2s;" 
        onmouseover="this.style.borderColor='#58a6ff'; this.style.color='#58a6ff';"
        onmouseout="this.style.borderColor='#444'; this.style.color='#e6edf3';">
            Restart Simulation
        </button>
    </div>
    <div style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
        <div id="orderbook" style="font-family: monospace; font-size: 13px; width: 150px; padding: 20px; background-color: rgba(0, 0, 0, 0.5);">
            <div style="color: white">Orderbook</div>
            <div id="asks" style="height: 50px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;"></div>
            <hr style="border: none; border-top: 1px solid #444; margin: 4px 0;">
            <div id="bids" style="height: 50px; overflow: hidden;"></div>
        </div>
    </div>
    <div style="display: flex; justify-content: center; align-items: center; padding: 20px; height: 100vh; box-sizing: border-box;">
        <div id="chart"></div>
    </div>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        const tzOffset = new Date().getTimezoneOffset() * -60;

        const GREEN = "#3fb950"
        const RED = "#f85149"
        const M_GREEN = "#87ceaa"
        const M_RED = "#ff8c7a"

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0d1117' }, textColor: '#e6edf3' },
            grid: { vertLines: { color: '#30363d' }, horzLines: { color: '#30363d' } },
            width: document.getElementById('chart').clientWidth,
            height: document.getElementById('chart').clientHeight,
            timeScale: {
                timeVisible: true,
                secondsVisible: true,
                timezone: 'Asia/Singapore',
            },
        });

        const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
            upColor: GREEN,
            downColor: RED,
            borderUpColor: GREEN,
            borderDownColor: RED,
            wickUpColor: GREEN,
            wickDownColor: RED,
            priceScaleId: "right",
        });

        const volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
            color: '#58a6ff',
            priceFormat: { type: 'volume' },
            priceScaleId: 'volume',  
        });

        chart.priceScale('right').applyOptions({
            scaleMargins: { top: 0.1, bottom: 0.3 },
            autoScale: true,
            visible: true
        });

        chart.priceScale('volume').applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
            visible: false
        });

        let bidLine = null;
        let askLine = null;
        let currCandle = null;
        let currVol = 0;
        const book = { bids: {}, asks: {} };

        function renderBook() {
            bids = { ...book.bids };
            asks = { ...book.asks };
            const bidPrices = Object.keys(bids).map(Number).sort((a, b) => b - a);
            const askPrices = Object.keys(asks).map(Number).sort((a, b) => b - a);

            document.getElementById('asks').innerHTML = askPrices.map(px =>
                asks[px] ? 
                `<div style="display:flex; justify-content:space-between; color:#f85149;">
                    <span>${px}</span><span>${asks[px]}</span>
                </div>` : ''
            ).join('');

            document.getElementById('bids').innerHTML = bidPrices.map(px =>
                bids[px] ? 
                `<div style="display:flex; justify-content:space-between; color:#3fb950;">
                    <span>${px}</span><span>${bids[px]}</span>
                </div>` : ''
            ).join('');
        }

        setInterval(renderBook, 100);


        async function restart() {
            await fetch('/restart', { method: 'POST' });
            candleSeries.setData([]);
            volumeSeries.setData([]);
            bidLine = null;
            askLine = null;
            currCandle = null;
            currVol = 0;
            book.bids = [];
            book.asks = [];
        }


        function onTrade(data) {
            data.ts += tzOffset;
            const time = data.ts - data.ts % 10;
            const price = parseFloat(data.px);

            if (!currCandle || currCandle.time !== time) {
                currCandle = { time, open: price, high: price, low: price, close: price };
                currVol = data.qty;
            } else {
                currCandle.high = Math.max(currCandle.high, price);
                currCandle.low = Math.min(currCandle.low, price);
                currCandle.close = price;
                currVol += data.qty;
            }

            candleSeries.update(currCandle);
            volumeSeries.update({ time, value: currVol });
        }

        function onBBO(data) {
            if (data.bid_px) {
                if (bidLine) candleSeries.removePriceLine(bidLine);
                bidLine = candleSeries.createPriceLine({
                    price: parseFloat(data.bid_px),
                    color: M_GREEN,
                    lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    axisLabelVisible: true,
                    title: 'bid',
                });
            }
            if (data.ask_px) {
                if (askLine) candleSeries.removePriceLine(askLine);
                askLine = candleSeries.createPriceLine({
                    price: parseFloat(data.ask_px),
                    color: M_RED,
                    lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    axisLabelVisible: true,
                    title: 'ask',
                });
            }
        }

        function onBookUpdate(data) {
            data.bids.forEach(([price, qty]) => {
                if (qty == 0) delete book.bids[price];
                else book.bids[price] = qty;
            });
            data.asks.forEach(([price, qty]) => {
                if (qty == 0) delete book.asks[price];
                else book.asks[price] = qty;
            });
        }


        async function fetchTrades() {
            const res = await fetch('/trades');
            const trades = await res.json();
            for (const trade of trades) onTrade(trade); 
        }

        fetchTrades();

        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            switch (data.type) {
                case "trade":
                    onTrade(data);
                    break;
                case "bbo":
                    onBBO(data);
                    break;
                case "book_update":
                    onBookUpdate(data);
                    break;
                default:
                    console.log("unknown", data.type)
            }
        };

        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: document.getElementById('chart').clientWidth,
                height: document.getElementById('chart').clientHeight 
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulated Exchange</title>
    <style>
        body { background: #0d1117; margin: 0; }
        #chart { width: 100%; height: 100%; }
    </style>
</head>
<body>

                color: #e6edf3;

    <div style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
        <div style="font-family: monospace; font-size: 13px; width: 150px; padding: 20px; background-color: rgba(0, 0, 0, 0.5);">
            <div style="color: white">Orderbook</div>
            <div id="asks" style="height: 60px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;"></div>
            <hr style="border: none; border-top: 1px solid #444; margin: 4px 0;">
            <div id="bids" style="height: 60px; overflow: hidden;"></div>
        </div>
        <br/>
        <div style="font-family: monospace; font-size: 13px; width: 150px; padding: 20px; background-color: rgba(0, 0, 0, 0.5);">
            <div style="color: white">Trades</div>
            <hr style="border: none; border-top: 1px solid #444; margin: 4px 0;">
            <div id="trades"></div>
        </div>
    </div>
    <div style="display: flex; justify-content: center; align-items: center; padding: 20px; height: 100vh; box-sizing: border-box;">
        <div id="chart"></div>
    </div>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        const tzOffset = new Date().getTimezoneOffset() * -60;

        const GREEN = "#3fb950"
        const RED = "#f85149"
        const M_GREEN = "#87ceaa"
        const M_RED = "#ff8c7a"

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#0d1117' }, textColor: '#e6edf3' },
            grid: { vertLines: { color: '#30363d' }, horzLines: { color: '#30363d' } },
            width: document.getElementById('chart').clientWidth,
            height: document.getElementById('chart').clientHeight,
            timeScale: {
                timeVisible: true,
                secondsVisible: true,
                timezone: 'Asia/Singapore',
            },
        });

        const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
            upColor: GREEN,
            downColor: RED,
            borderUpColor: GREEN,
            borderDownColor: RED,
            wickUpColor: GREEN,
            wickDownColor: RED,
            priceScaleId: "right",
        });

        const volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
            color: '#58a6ff',
            priceFormat: { type: 'volume' },
            priceScaleId: 'volume',  
        });

        chart.priceScale('right').applyOptions({
            scaleMargins: { top: 0.1, bottom: 0.3 },
            autoScale: true,
            visible: true
        });

        chart.priceScale('volume').applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
            visible: false
        });

        let bidLine = null;
        let askLine = null;
        let currCandle = null;
        let currVol = 0;
        const bids = {}
        const asks = {}
        const trades = []

        function repaint() {
            const bids_ = { ...bids };
            const asks_ = { ...asks };
            const bidPrices = Object.keys(bids_).map(Number).sort((a, b) => b - a);
            const askPrices = Object.keys(asks_).map(Number).sort((a, b) => b - a);
            const maxQty = Math.max(...Object.values(bids_), ...Object.values(asks_), 1);

            document.getElementById('asks').innerHTML = askPrices.map(px => {
                if (!asks_[px]) return '';
                const pct = Math.round(asks_[px] / maxQty * 100);
                return `<div style="position:relative; display:flex; justify-content:space-between; font-family:monospace; font-size:12px; padding:2px 4px;">
                    <div style="position:absolute; right:0; top:0; bottom:0; width:${pct}%; background:rgba(248,81,73,0.15);"></div>
                    <span style="position:relative; color:${RED};">${px}</span>
                    <span style="position:relative; color:${RED};">${asks_[px]}</span>
                </div>`;
            }).join('');

            document.getElementById('bids').innerHTML = bidPrices.map(px => {
                if (!bids_[px]) return '';
                const pct = Math.round(bids_[px] / maxQty * 100);
                return `<div style="position:relative; display:flex; justify-content:space-between; font-family:monospace; font-size:12px; padding:2px 4px;">
                    <div style="position:absolute; right:0; top:0; bottom:0; width:${pct}%; background:rgba(63,185,80,0.15);;"></div>
                    <span style="position:relative; color:${GREEN};">${px}</span>
                    <span style="position:relative; color:${GREEN};">${bids_[px]}</span>
                </div>`;
            }).join('');


            document.getElementById('trades').innerHTML = trades.map(t =>
                `<div style="display:flex; justify-content:space-between; font-family:monospace; font-size:12px; padding:2px 0; color:${t.aggressor_side === 'BUY' ? GREEN : RED};">
                    <span>${t.px}</span>
                    <span>${t.qty}</span>
                </div>`
            ).join('');
        }

        setInterval(repaint, 200);

        async function restart() {
            await fetch('/restart', { method: 'POST' });
            candleSeries.setData([]);
            volumeSeries.setData([]);
            bidLine = null;
            askLine = null;
            currCandle = null;
            currVol = 0;
            bids.length = 0;
            asks.length = 0;
            trades.length = 0;
            init();
        }

        function onTrade(data) {
            data.ts += tzOffset;
            const time = data.ts - data.ts % 10;
            const price = parseFloat(data.px);

            if (!currCandle || currCandle.time !== time) {
                currCandle = { time, open: price, high: price, low: price, close: price };
                currVol = data.qty;
            } else {
                currCandle.high = Math.max(currCandle.high, price);
                currCandle.low = Math.min(currCandle.low, price);
                currCandle.close = price;
                currVol += data.qty;
            }

            candleSeries.update(currCandle);
            volumeSeries.update({ time, value: currVol });

            trades.unshift(data);
            if (trades.length > 5) trades.pop();
        }

        function onL1Quote(data) {
            if (data.bid_px) {
                if (bidLine) candleSeries.removePriceLine(bidLine);
                bidLine = candleSeries.createPriceLine({
                    price: parseFloat(data.bid_px),
                    color: M_GREEN,
                    lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    axisLabelVisible: true,
                    title: 'bid',
                });
            }
            if (data.ask_px) {
                if (askLine) candleSeries.removePriceLine(askLine);
                askLine = candleSeries.createPriceLine({
                    price: parseFloat(data.ask_px),
                    color: M_RED,
                    lineWidth: 1,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    axisLabelVisible: true,
                    title: 'ask',
                });
            }
        }

        function onL2Update(data) {
            data.bids.forEach(([price, qty]) => {
                if (qty == 0) delete bids[price];
                else bids[price] = qty;
            });
            data.asks.forEach(([price, qty]) => {
                if (qty == 0) delete asks[price];
                else asks[price] = qty;
            });
        }

        async function init() {
            const res = await fetch('/trades');
            const trades = await res.json();
            for (const trade of trades) onTrade(trade); 

            const ws = new WebSocket(`ws://${window.location.host}/ws`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                switch (data.type) {
                    case "trade":
                        onTrade(data);
                        break;
                    case "l1_quote":
                        onL1Quote(data);
                        break;
                    case "l2_update":
                        onL2Update(data);
                        break;
                    default:
                        console.log("unknown", data.type)
                }
            };
        }

        init();

        window.addEventListener('resize', () => {
            chart.applyOptions({ 
                width: document.getElementById('chart').clientWidth,
                height: document.getElementById('chart').clientHeight 
            });
        });
    </script>
</body>
</html>
